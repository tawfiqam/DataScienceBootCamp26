<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MI Program Summer 2026: Introductory Python &amp; Mathematics Bootcamp</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --slate: #5C6FA0;
    --slate-mid: #6D80B0;
    --slate-light: #8898C2;
    --peach: #E8956A;
    --peach-light: #F0AA85;
    --peach-pale: #FEF4EE;
    --bg: #F6F4FB;
    --sage: #6BA890;
    --sage-pale: #EDF6F2;
    --lavender-pale: #EEEAFC;
    --text: #2D3748;
    --text-mid: #4A5568;
    --text-muted: #718096;
    --border: #DDD7EE;
    --border-dark: #C8BEE0;
    --white: #ffffff;
    --scarlet: #cc0033;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 16px;
  }
  #root { min-height: 100vh; }

  /* ── Header ── */
  .site-header {
    background: var(--slate);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--peach);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .header-brand {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--peach-light);
    letter-spacing: 0.01em;
  }
  .header-nav { display: flex; gap: 0.25rem; align-items: center; }
  .nav-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.75);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }
  .nav-btn:hover { color: white; background: rgba(255,255,255,0.12); }
  .nav-btn.active { color: var(--peach-light); }
  .nav-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); margin: 0 0.4rem; }
  .page-tab {
    display: inline-block;
    background: none;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 0.28rem 0.85rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
    line-height: 1.5;
    vertical-align: middle;
    box-sizing: border-box;
  }
  .page-tab:hover { color: white; border-color: rgba(255,255,255,0.55); }
  .page-tab.active { color: var(--slate); background: white; border-color: white; font-weight: 500; }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(140deg, var(--slate) 0%, var(--slate-mid) 55%, #8898C8 100%);
    color: white;
    padding: 4.5rem 2rem 3.5rem;
  }
  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: end;
  }
  .hero-institution {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--peach-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.75rem, 3.5vw, 2.85rem);
    font-weight: 700;
    line-height: 1.2;
    color: white;
    margin-bottom: 0.75rem;
  }
  .hero-subtitle {
    font-size: 1rem;
    color: rgba(255,255,255,0.85);
    font-weight: 300;
    max-width: 560px;
    line-height: 1.65;
  }
  .hero-meta { text-align: right; min-width: 200px; }
  .hero-badge {
    display: inline-block;
    background: var(--peach);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .hero-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.92);
    line-height: 1.4;
  }
  .hero-instructor { font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-top: 0.5rem; }
  .hero-instructor a { color: var(--peach-light); text-decoration: none; }

  /* ── Welcome banner ── */
  .welcome-banner {
    background: linear-gradient(135deg, var(--lavender-pale) 0%, var(--peach-pale) 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem;
  }
  .welcome-banner-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.9rem;
  }
  .welcome-emoji { font-size: 1.35rem; flex-shrink: 0; }
  .welcome-text { font-size: 0.88rem; color: var(--text-mid); line-height: 1.55; }
  .welcome-text strong { color: var(--slate); }

  /* ── Info strip ── */
  .info-strip { background: var(--slate-mid); }
  .info-strip-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.25rem 2rem;
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
  }
  .info-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .info-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--peach-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .info-value { font-size: 0.87rem; color: rgba(255,255,255,0.88); }

  /* ── Main layout ── */
  .page-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  /* ── Sidebar ── */
  .sidebar { position: sticky; top: 72px; }
  .sidebar-section { margin-bottom: 2rem; }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-link {
    display: block;
    font-size: 0.83rem;
    color: var(--text-mid);
    text-decoration: none;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: 0.1rem;
    background: none;
    border-right: none;
    border-top: none;
    border-bottom-color: transparent;
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .sidebar-link:hover { background: rgba(91,111,160,0.07); border-left-color: var(--peach); color: var(--slate); }
  .sidebar-link.week-link { font-family: 'DM Mono', monospace; font-size: 0.78rem; }

  /* ── Content ── */
  .content { min-width: 0; }
  .section { margin-bottom: 3.5rem; scroll-margin-top: 80px; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--border);
  }
  .section-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--peach);
    letter-spacing: 0.06em;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--slate);
  }
  .section p { color: var(--text-mid); margin-bottom: 1rem; line-height: 1.8; }
  .section p:last-child { margin-bottom: 0; }

  /* ── Overview table ── */
  .overview-table { width: 100%; border-collapse: collapse; font-size: 0.87rem; margin: 1rem 0; }
  .overview-table th {
    background: var(--slate);
    color: var(--peach-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.75rem 1rem;
    text-align: left;
    border: none;
  }
  .overview-table td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-mid);
    vertical-align: top;
  }
  .overview-table tr:last-child td { border-bottom: none; }
  .overview-table tr:nth-child(even) td { background: rgba(91,111,160,0.03); }
  .overview-table tr:hover td { background: var(--peach-pale); }
  .week-num { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--peach); font-weight: 500; white-space: nowrap; }
  .capstone-row td { background: var(--peach-pale) !important; }
  .capstone-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--peach); letter-spacing: 0.04em; }

  /* ── Learning objectives ── */
  .objectives-list { list-style: none; display: grid; gap: 0.6rem; }
  .objective-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--sage);
    border-radius: 0 6px 6px 0;
    font-size: 0.88rem;
    color: var(--text-mid);
    line-height: 1.6;
  }
  .obj-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); flex-shrink: 0; margin-top: 0.45rem; }

  /* ── Assessment ── */
  .assessment-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .assessment-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: 0.5rem;
  }
  .assessment-desc { font-size: 0.87rem; color: var(--text-muted); line-height: 1.65; }

  /* ── Milestone box ── */
  .milestone-box {
    background: var(--peach-pale);
    border: 1px solid #F0C4A8;
    border-left: 4px solid var(--peach);
    border-radius: 0 6px 6px 0;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 1.75rem;
  }
  .milestone-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--peach);
    margin-bottom: 0.5rem;
  }
  .milestone-text { font-size: 0.87rem; color: var(--text-mid); line-height: 1.65; }

  /* ── Week sections ── */
  .week-section { scroll-margin-top: 80px; margin-bottom: 3rem; }
  .week-header {
    background: linear-gradient(135deg, var(--slate) 0%, var(--slate-mid) 100%);
    color: white;
    padding: 1.5rem 1.75rem;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .week-badge { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--peach-light); letter-spacing: 0.08em; text-transform: uppercase; }
  .week-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; flex: 1; }
  .week-date { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: rgba(255,255,255,0.55); }
  .week-body {
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .week-subsection { padding: 1.5rem 1.75rem; border-bottom: 1px solid var(--border); }
  .week-subsection:last-child { border-bottom: none; }
  .week-sub-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 1rem;
  }
  .session-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  .session-item { display: flex; gap: 0.75rem; font-size: 0.87rem; color: var(--text-mid); line-height: 1.5; align-items: flex-start; }
  .session-dash { color: var(--peach); font-family: 'DM Mono', monospace; flex-shrink: 0; margin-top: 0.1rem; }

  /* ── Sessions page header ── */
  .sessions-page-header {
    background: linear-gradient(135deg, var(--lavender-pale) 0%, var(--peach-pale) 100%);
    border-bottom: 1px solid var(--border);
    padding: 2.25rem 2rem 2rem;
  }
  .sessions-page-header-inner { max-width: 1100px; margin: 0 auto; }
  .sessions-page-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: var(--slate); margin-bottom: 0.5rem; }
  .sessions-page-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; max-width: 580px; }

  /* ── Footer ── */
  .page-footer {
    background: var(--slate);
    color: rgba(255,255,255,0.45);
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
  .page-footer a { color: var(--peach-light); text-decoration: none; }

  @media (max-width: 760px) {
    .page-body { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .hero-inner { grid-template-columns: 1fr; }
    .hero-meta { text-align: left; }
    .info-strip-inner { gap: 1.25rem; }
    .header-nav { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

const weekData = [
  {
    id: "week1",
    num: 1,
    title: "Python Foundations & Data Libraries",
    date: "August 3, 2026",
    description: "We begin with the building blocks of Python and introduce the core libraries you'll rely on throughout the program. Students arrive having completed the LinkedIn Learning pre-work, so this session moves from fundamentals directly into hands-on work with real data.",
    session: [
      "Welcome and course orientation; Rutgers SC&I Data Science Concentration overview and bootcamp goals",
      "Environment setup: Jupyter Notebooks and Google Colab; introduction to the course platform",
      "Python basics: data types, variables, operators, and control flow (if/else, loops)",
      "Defining and calling functions; writing readable, commented code",
      "Lists, tuples, dictionaries, and sets: when and why to use each",
      "Introduction to NumPy: arrays, vectorized operations, and why NumPy is faster than loops",
      "Introduction to Pandas: DataFrames, Series, reading CSVs, and basic indexing",
      "Live coding: working with a social-science dataset (e.g., public health records or census microdata)",
    ],
    async: [
      "LinkedIn Learning: Python Fundamentals + Pandas and NumPy modules (approx. 3–4 hours)",
      "McKinney, Python for Data Analysis, Chapters 2–5 (Python basics, NumPy, Pandas)",
      "Programming exercise: use Pandas to filter, group, and summarize a dataset from an open data portal (e.g., data.gov, ICPSR, Pew Research)",
      "Pod meeting: compare approaches with your study group",
    ],
    milestone: "Write a Python script using a Pandas DataFrame that loads a real dataset of your choice, performs basic filtering or aggregation, and answers a specific research question. Submit as a Jupyter Notebook with comments explaining each step and a brief written narrative of your findings.",
  },
  {
    id: "week2",
    num: 2,
    title: "Data Wrangling, Visualization & Statistics",
    date: "August 10, 2026",
    description: "This week you'll learn how to clean messy data and turn it into clear visuals, two of the most practical skills in data science. We also introduce core statistical ideas and build intuition for linear algebra through hands-on Python examples.",
    session: [
      "Handling missing data: detection, imputation strategies, and when to drop",
      "Merging and reshaping datasets: concat, merge, melt, and pivot",
      "Exploratory data analysis (EDA)",
      "Matplotlib and Seaborn: histograms, scatter plots, bar charts, heatmaps",
      "Descriptive statistics: mean, median, variance, and standard deviation (computed and interpreted in Pandas)",
      "Probability basics: distributions, the normal distribution, and Bayes' theorem (visualized with Seaborn)",
      "Linear algebra intuition: vectors, matrices, and dot products as NumPy operations; why matrices = data",
      "Live coding: end-to-end wrangling, visualization, and statistical analysis of a public dataset",
    ],
    async: [
      "LinkedIn Learning: Data Visualization, Pandas data cleaning, and Foundational Math for ML modules (statistics and probability)",
      "McKinney, Chapters 8–9 (data wrangling, plotting)",
      "Microsoft DAT256X notebooks: vectors and matrices (Jupyter, Python edition)",
      "Programming exercise: wrangle a messy dataset, produce at least two publication-ready plots, and compute descriptive statistics",
      "Pod meeting",
    ],
    milestone: "Produce three visualizations of a public dataset that tell a coherent story. Additionally, compute and interpret descriptive statistics for at least two numeric variables in your dataset. Write a brief paragraph explaining your visualization choices and a plain-language interpretation of the statistical patterns you observe. Submit as a Jupyter Notebook.",
  },
  {
    id: "week3",
    num: 3,
    title: "Calculus Intuition & Regression",
    date: "August 17, 2026",
    description: "Don't worry: you don't need calculus fluency to succeed here. This week we build visual intuition for how models 'learn,' then apply those ideas directly to linear regression. By the end, you'll have trained your first machine-learning model.",
    session: [
      "Derivatives as rates of change: intuition first, notation second",
      "Gradient descent: visualizing cost functions and how models 'learn'",
      "Linear regression from scratch: deriving the line of best fit",
      "Linear regression with scikit-learn: fit, predict, evaluate",
      "Model evaluation: RMSE, R², and the bias-variance trade-off",
      "Live coding: housing price prediction or a similar applied domain example",
      "Preview of Week 4 capstone: dataset selection guidance and project scoping",
    ],
    async: [
      "LinkedIn Learning: Calculus for ML and regression modules",
      "Microsoft DAT256X: calculus and gradient descent notebooks",
      "Programming exercise: implement gradient descent from scratch, then compare to scikit-learn output",
      "Begin dataset selection and cleaning for Week 4 capstone",
      "Pod meeting",
    ],
    milestone: "Build a linear regression model using scikit-learn on a domain-relevant dataset of your choice. Report your model's RMSE and R² in the notebook and write a plain-language interpretation: what is the model predicting, how well does it work, and what are its limitations? This dataset may be the same one you plan to use for the Week 4 capstone.",
  },
  {
    id: "week4",
    num: 4,
    title: "Capstone: Applied ML Workflow",
    date: "August 24, 2026",
    capstone: true,
    description: "This is your moment to bring everything together! You'll apply the complete ML pipeline to a dataset you care about and share your work with the group. We'll also walk you through the fall core courses so you feel ready and confident for what comes next.",
    session: [
      "Review of the full ML pipeline: load → clean → feature engineer → train → evaluate",
      "Connecting the bootcamp to the four-course core: MI 547 (Data Curation), MI 552 (Computational Reasoning), MI 564 (Machine Learning for Data Science), and the Neural Networks course",
      "Student capstone presentations (5–7 minutes each): dataset choice, approach, findings, and reflections",
      "Q&A, peer feedback, and program overview; pilot feedback survey",
    ],
    async: [
      "Complete and submit Final Milestone Jupyter Notebook",
      "Prepare 5–7 minute presentation for synchronous session",
      "fast.ai: Practical Deep Learning for Coders (optional: a preview of neural networks for students who want an early look at what's ahead)",
    ],
    milestone: "Submit a complete Jupyter Notebook demonstrating the full ML pipeline (data ingestion, cleaning, feature engineering, model training, and evaluation) on a real dataset of your choosing. Datasets should be drawn from domains relevant to communication, information science, public health, social science, or another area of personal interest. Present your work (5–7 minutes) during the Week 4 synchronous session.",
  },
];

const overviewRows = [
  { week: "Week 1", title: "Python Foundations & Data Libraries", topics: "Data types, control flow, functions, NumPy, Pandas, DataFrames, CSV I/O", milestone: "Script: load, filter, and answer a research question with Pandas" },
  { week: "Week 2", title: "Data Wrangling, Visualization & Statistics", topics: "Missing data, merging, Matplotlib, Seaborn, descriptive stats, probability, linear algebra intuition", milestone: "Three visualizations + statistical analysis of a chosen public dataset" },
  { week: "Week 3", title: "Calculus Intuition & Regression", topics: "Gradient descent, loss functions, linear regression, scikit-learn, RMSE, R², bias-variance", milestone: "Regression model with RMSE/R² interpretation" },
  { week: "Week 4 ★", title: "Capstone: Applied ML Workflow", topics: "Full pipeline: load → clean → feature engineer → train → evaluate → present", milestone: "★ FINAL: Full ML pipeline notebook + live presentation", capstone: true },
];

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
}

function NavBtn({ label, sectionId }) {
  return (
    <button className="nav-btn" onClick={() => scrollTo(sectionId)}>
      {label}
    </button>
  );
}

function WeekSection({ w }) {
  return (
    <div className="week-section" id={w.id}>
      <div className="week-header" style={w.capstone ? { background: "linear-gradient(135deg, #8B6BAE 0%, #A07FC0 100%)" } : {}}>
        <div>
          <div className="week-badge">Week {w.num}</div>
          <div className="week-title">{w.title}</div>
        </div>
        <div className="week-date">{w.date}</div>
      </div>
      <div className="week-body">
        <div className="week-subsection">
          <p style={{ fontSize: "0.88rem", color: "#4b5563", lineHeight: "1.75" }}>{w.description}</p>
        </div>
        <div className="week-subsection">
          <div className="week-sub-title">Synchronous Session (3 hours)</div>
          <ul className="session-list">
            {w.session.map((item, i) => (
              <li key={i} className="session-item">
                <span className="session-dash">→</span>
                <span>{item}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="week-subsection">
          <div className="week-sub-title">Asynchronous Work</div>
          <ul className="session-list">
            {w.async.map((item, i) => (
              <li key={i} className="session-item">
                <span className="session-dash">→</span>
                <span>{item}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="milestone-box">
          <div className="milestone-label">{w.capstone ? "★ Final Milestone: Capstone Project" : `Week ${w.num} Milestone`}</div>
          <div className="milestone-text">{w.milestone}</div>
        </div>
      </div>
    </div>
  );
