<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python & Mathematics Bootcamp — Rutgers SC&I</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2d42;
    --navy-light: #243850;
    --amber: #d4882a;
    --amber-light: #e8a84e;
    --amber-pale: #fdf3e1;
    --cream: #faf8f4;
    --text: #1a1a1a;
    --text-mid: #3d4047;
    --text-muted: #6b7280;
    --border: #e2ddd5;
    --border-dark: #c8c2b8;
    --white: #ffffff;
    --scarlet: #cc0033;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    line-height: 1.7;
    font-size: 16px;
  }
  #root { min-height: 100vh; }

  /* Header */
  .site-header {
    background: var(--navy);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--amber);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .header-brand {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--amber-light);
    letter-spacing: 0.01em;
  }
  .header-nav {
    display: flex;
    gap: 0.25rem;
  }
  .nav-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.65);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }
  .nav-btn:hover { color: white; background: rgba(255,255,255,0.08); }
  .nav-btn.active { color: var(--amber-light); }

  /* Download button */


  /* Hero */
  .hero {
    background: var(--navy);
    color: white;
    padding: 4.5rem 2rem 3.5rem;
    border-bottom: 1px solid var(--navy-light);
  }
  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: end;
  }
  .hero-institution {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--amber);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3.25rem);
    font-weight: 700;
    line-height: 1.15;
    color: white;
    margin-bottom: 0.75rem;
  }
  .hero-subtitle {
    font-size: 1rem;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }
  .hero-meta {
    text-align: right;
    min-width: 200px;
  }
  .hero-badge {
    display: inline-block;
    background: var(--amber);
    color: var(--navy);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .hero-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }
  .hero-instructor {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    margin-top: 0.5rem;
  }
  .hero-instructor a { color: var(--amber); text-decoration: none; }

  /* Info strip */
  .info-strip {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--navy-light);
  }
  .info-strip-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.25rem 2rem;
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
  }
  .info-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .info-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .info-value { font-size: 0.87rem; color: rgba(255,255,255,0.8); }

  /* Main layout */
  .page-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 3rem;
    align-items: start;
  }

  /* Sidebar */
  .sidebar {
    position: sticky;
    top: 72px;
  }
  .sidebar-section { margin-bottom: 2rem; }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-link {
    display: block;
    font-size: 0.83rem;
    color: var(--text-mid);
    text-decoration: none;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: 0.1rem;
  }
  .sidebar-link:hover { background: rgba(212,136,42,0.08); border-left-color: var(--amber); color: var(--amber); }
  .sidebar-link.week-link { font-family: 'DM Mono', monospace; font-size: 0.78rem; }

  /* Content area */
  .content { min-width: 0; }

  /* Section styling */
  .section { margin-bottom: 3.5rem; scroll-margin-top: 80px; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--border);
  }
  .section-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    letter-spacing: 0.06em;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--navy);
  }
  .section p { color: var(--text-mid); margin-bottom: 1rem; line-height: 1.8; }
  .section p:last-child { margin-bottom: 0; }

  /* Overview table */
  .overview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.87rem;
    margin: 1rem 0;
  }
  .overview-table th {
    background: var(--navy);
    color: var(--amber-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.75rem 1rem;
    text-align: left;
    border: none;
  }
  .overview-table td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-mid);
    vertical-align: top;
  }
  .overview-table tr:last-child td { border-bottom: none; }
  .overview-table tr:nth-child(even) td { background: rgba(0,0,0,0.02); }
  .overview-table tr:hover td { background: var(--amber-pale); }
  .week-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--amber);
    font-weight: 500;
    white-space: nowrap;
  }
  .capstone-row td { background: var(--amber-pale) !important; }
  .capstone-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--amber);
    letter-spacing: 0.04em;
  }

  /* Info table */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.87rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .info-table td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table td:first-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    background: var(--cream);
    width: 180px;
  }

  /* Learning objectives */
  .objectives-list {
    list-style: none;
    display: grid;
    gap: 0.6rem;
  }
  .objective-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 0 6px 6px 0;
    font-size: 0.88rem;
    color: var(--text-mid);
    line-height: 1.6;
  }
  .obj-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    margin-top: 0.45rem;
  }

  /* Resources */
  .resources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
  }
  .resource-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    border-top: 3px solid var(--navy);
  }
  .resource-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }
  .resource-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.55; }
  .resource-link {
    display: inline-block;
    margin-top: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .resource-link:hover { text-decoration: underline; }

  /* Week sections */
  .week-section { scroll-margin-top: 80px; margin-bottom: 3rem; }
  .week-header {
    background: var(--navy);
    color: white;
    padding: 1.5rem 1.75rem;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .week-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .week-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    flex: 1;
  }
  .week-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
  }
  .week-body {
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .week-subsection { padding: 1.5rem 1.75rem; border-bottom: 1px solid var(--border); }
  .week-subsection:last-child { border-bottom: none; }
  .week-sub-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1rem;
  }
  .session-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .session-item {
    display: flex;
    gap: 0.75rem;
    font-size: 0.87rem;
    color: var(--text-mid);
    line-height: 1.5;
    align-items: flex-start;
  }
  .session-dash {
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  /* Milestone */
  .milestone-box {
    background: var(--amber-pale);
    border: 1px solid #e8c882;
    border-left: 4px solid var(--amber);
    border-radius: 0 6px 6px 0;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 1.75rem;
  }
  .milestone-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.5rem;
  }
  .milestone-text { font-size: 0.87rem; color: var(--text-mid); line-height: 1.65; }

  /* Assessment */
  .assessment-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .assessment-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 0.5rem;
  }
  .assessment-desc { font-size: 0.87rem; color: var(--text-muted); line-height: 1.65; }

  /* Footer */
  .page-footer {
    background: var(--navy);
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
  .page-footer a { color: var(--amber); text-decoration: none; }

  @media (max-width: 760px) {
    .page-body { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .hero-inner { grid-template-columns: 1fr; }
    .hero-meta { text-align: left; }
    .info-strip-inner { gap: 1.25rem; }
    .header-nav { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

  { name: "Foundational Math for Machine Learning", provider: "LinkedIn Learning", desc: "Covers linear algebra, calculus, and statistics for ML. Assigned as pre-bootcamp self-paced work beginning July 20.", url: "https://linkedin.com/learning/paths/foundational-math-for-machine-learning" },

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
}

function NavBtn({ label, sectionId }) {
  return (
    <button className="nav-btn" onClick={() => scrollTo(sectionId)}>
      {label}
    </button>
  );
}

function WeekSection({ w }) {
  return (
    <div className="week-section" id={w.id}>
      <div className="week-header" style={w.capstone ? { background: "#3a2200" } : {}}>
        <div>
          <div className="week-badge">Week {w.num}</div>
          <div className="week-title">{w.title}</div>
        </div>
        <div className="week-date">{w.date}</div>
      </div>
      <div className="week-body">
        <div className="week-subsection">
          <p style={{ fontSize: "0.88rem", color: "#4b5563", lineHeight: "1.75" }}>{w.description}</p>

        <div className="week-subsection">
          <div className="week-sub-title">Synchronous Session — 3 hours</div>
          <ul className="session-list">
            {w.session.map((item, i) => (
              <li key={i} className="session-item">
                <span className="session-dash">→</span>
                <span>{item}</span>
              </li>
            ))}
          </ul>
        </div>

        <div className="week-subsection">
          <div className="week-sub-title">Asynchronous Work</div>
          <ul className="session-list">
            {w.async.map((item, i) => (

              </li>
            ))}
          </ul>
        </div>

        <div className="milestone-box">
          <div className="milestone-label">{w.capstone ? "★ Final Milestone — Capstone Project" : `Week ${w.num} Milestone`}</div>

        </div>
      </div>
    </div>
  );
